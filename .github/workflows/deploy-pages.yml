name: Build and Deploy GitHub Pages

on:
  push:
    branches: ['main']
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.7.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm run lint

      - name: Test
        run: pnpm run test

      - name: Build
        run: pnpm run build

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  pages-preflight:
    runs-on: ubuntu-latest
    outputs:
      can_deploy: ${{ steps.pages.outputs.can_deploy }}
    steps:
      - name: Check Pages source
        id: pages
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail

          status_code="$(curl -sS -L \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            -o pages.json \
            -w "%{http_code}" \
            "https://api.github.com/repos/${REPOSITORY}/pages")"

          if [ "${status_code}" = "404" ]; then
            echo "::warning::GitHub Pages is not enabled yet. Enable it in Settings > Pages > Source: GitHub Actions, then rerun this workflow."
            echo "can_deploy=false" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          if [ "${status_code}" != "200" ]; then
            cat pages.json
            exit 1
          fi

          build_type="$(jq -r '.build_type // "legacy"' pages.json)"

          if [ "${build_type}" != "workflow" ]; then
            echo "::warning::GitHub Pages is enabled, but its source is not GitHub Actions. Change Settings > Pages > Source to GitHub Actions, then rerun this workflow."
            echo "can_deploy=false" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          echo "can_deploy=true" >> "${GITHUB_OUTPUT}"

  deploy:
    if: needs.pages-preflight.outputs.can_deploy == 'true'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: [build, pages-preflight]
    steps:
      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
